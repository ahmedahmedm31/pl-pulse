services:
  - type: web
    name: pl-pulse
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/seed_database.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./plpulse.db
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
